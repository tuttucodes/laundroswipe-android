name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'preview'

jobs:
  build-and-release:
    name: EAS build + GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      PROFILE: ${{ github.event.inputs.profile || 'preview' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EAS auth
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN secret is empty." >&2
            exit 1
          fi
          eas whoami

      - name: Build Android APK on EAS
        id: build
        run: |
          set -euo pipefail
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --wait \
            --json > build.json
          ARTIFACT=$(node -e "const b=require('./build.json');const m=Array.isArray(b)?b[0]:b;console.log(m.artifacts?.buildUrl||m.artifacts?.applicationArchiveUrl||'')")
          if [ -z "$ARTIFACT" ]; then
            echo "Could not resolve EAS build artifact URL." >&2
            cat build.json
            exit 1
          fi
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        env:
          ARTIFACT_URL: ${{ steps.build.outputs.artifact }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          SAFE_REF=$(printf '%s' "$REF_NAME" | tr -cd 'A-Za-z0-9._-')
          OUT="dist/laundroswipe-${SAFE_REF}.apk"
          curl -L --fail --retry 4 --retry-delay 5 -o "$OUT" "$ARTIFACT_URL"
          echo "OUT=$OUT" >> "$GITHUB_ENV"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: laundroswipe-apk
          path: dist/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.OUT }}
          name: LaundroSwipe ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Android APK built from EAS profile `${{ env.PROFILE }}`.
            Commit: ${{ github.sha }}
