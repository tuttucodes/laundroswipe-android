<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { background: #1746A2; color: #fff; }
  .frame { background: linear-gradient(180deg, #1746A2 0%, #3B6FD4 100%); }
  .hero {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 0 80px;
  }
  .logo {
    width: 220px; height: 220px; border-radius: 48px;
    background: #fff; display: flex; align-items: center; justify-content: center;
    margin-bottom: 80px; box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  }
  .logo-mark { font-size: 140px; }
  .emoji { font-size: 200px; margin-bottom: 60px; filter: drop-shadow(0 12px 24px rgba(0,0,0,0.25)); }
  h1 { font-size: 96px; line-height: 1.1; text-align: center; margin-bottom: 32px; }
  .copy { font-size: 38px; opacity: 0.85; text-align: center; max-width: 720px; line-height: 1.4; }
  .dots { position: absolute; bottom: 280px; left: 0; right: 0; display: flex; justify-content: center; gap: 16px; }
  .dot { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.4); }
  .dot.active { background: #fff; width: 48px; border-radius: 8px; }
  .cta {
    position: absolute; bottom: 100px; left: 80px; right: 80px;
    background: #fff; color: #1746A2;
    padding: 32px; border-radius: 20px; text-align: center;
    font-size: 36px; font-weight: 700; font-family: 'Outfit', sans-serif;
  }
</style></head>
<body><div class="frame">
  <div class="statusbar dark">
    <span>9:41</span>
    <span class="right">5G <span class="dot"></span> 100%</span>
  </div>
  <div class="hero">
    <div class="emoji">🧺</div>
    <h1 class="display">Campus laundry,<br/>sorted.</h1>
    <p class="copy">Schedule pickups in seconds. One tap, one swipe, done.</p>
  </div>
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="cta">Get started →</div>
</div></body></html>
