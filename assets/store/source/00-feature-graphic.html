<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Source+Sans+3:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1024px; height: 500px;
    background: linear-gradient(135deg, #1746A2 0%, #3B6FD4 100%);
    color: #fff; font-family: 'Source Sans 3', sans-serif;
    overflow: hidden;
  }
  .frame {
    position: relative; width: 1024px; height: 500px;
    display: flex; align-items: center; padding: 0 80px;
    overflow: hidden;
  }
  .frame::before { content: ''; position: absolute; top:-200px; right:-100px; width:520px; height:520px; border-radius:50%; background: rgba(255,255,255,0.08); }
  .frame::after { content: ''; position: absolute; bottom:-160px; left:380px; width:340px; height:340px; border-radius:50%; background: rgba(255,255,255,0.05); }

  .left { position: relative; z-index:2; flex:1; }
  .logo-row { display:flex; align-items:center; gap:18px; margin-bottom:32px; }
  .logo-mark {
    width:72px; height:72px; border-radius:18px; background:#fff; color:#1746A2;
    display:flex; align-items:center; justify-content:center;
    font-family:'Outfit',sans-serif; font-weight:800; font-size:42px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .wordmark { font-family:'Outfit',sans-serif; font-weight:800; font-size:38px; letter-spacing:-0.5px; }

  h1 {
    font-family:'Outfit',sans-serif; font-weight:800;
    font-size:78px; line-height:1.0; letter-spacing:-1.5px;
    margin-bottom:22px;
  }
  .sub { font-size:26px; opacity:0.88; max-width:560px; line-height:1.4; }

  .pill-row { display:flex; gap:14px; margin-top:32px; }
  .pill {
    background: rgba(255,255,255,0.18); padding:10px 22px; border-radius:999px;
    font-size:18px; font-weight:600;
  }

  .right { position:relative; z-index:2; width:340px; height:100%; display:flex; align-items:center; justify-content:center; }
  .phone {
    width: 240px; height: 480px; border-radius: 36px; background:#0B1220;
    border: 6px solid #1A1D2E; box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    overflow:hidden; transform: rotate(8deg) translateY(20px);
  }
  .phone-screen {
    width:100%; height:100%; background:#F8FAFC; padding:24px 16px;
  }
  .ps-hdr { font-family:'Outfit',sans-serif; font-weight:700; font-size:18px; color:#1A1D2E; margin-bottom:12px; }
  .ps-sub { font-size:11px; color:#94A3B8; margin-bottom:14px; }
  .ps-card { background: linear-gradient(135deg,#1746A2,#3B6FD4); border-radius:14px; padding:14px; color:#fff; margin-bottom:12px; }
  .ps-card .t { font-family:'Outfit',sans-serif; font-weight:700; font-size:16px; }
  .ps-card .s { font-size:10px; opacity:0.8; margin-top:2px; }
  .ps-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .ps-tile { background:#fff; border-radius:10px; padding:8px 6px; text-align:center; }
  .ps-tile .ic { font-size:22px; }
  .ps-tile .lbl { font-size:9px; font-weight:700; margin-top:4px; color:#1746A2; }
</style></head>
<body><div class="frame">
  <div class="left">
    <div class="logo-row">
      <div class="logo-mark">L</div>
      <div class="wordmark">LaundroSwipe</div>
    </div>
    <h1>Campus laundry,<br/>sorted.</h1>
    <p class="sub">Schedule pickups in seconds. Track every order. Swipe to confirm.</p>
    <div class="pill-row">
      <span class="pill">Wash & Iron</span>
      <span class="pill">Dry clean</span>
      <span class="pill">Shoe clean</span>
    </div>
  </div>
  <div class="right">
    <div class="phone"><div class="phone-screen">
      <div class="ps-hdr">Hi Aarav 👋</div>
      <div class="ps-sub">Ready for a fresh load?</div>
      <div class="ps-card">
        <div class="t">Out for delivery</div>
        <div class="s">ETA · 6:30 PM today</div>
      </div>
      <div class="ps-grid">
        <div class="ps-tile"><div class="ic">👕</div><div class="lbl">Wash</div></div>
        <div class="ps-tile"><div class="ic">✨</div><div class="lbl" style="color:#F97316">Dry</div></div>
        <div class="ps-tile"><div class="ic">👟</div><div class="lbl" style="color:#0D9488">Shoes</div></div>
      </div>
    </div></div>
  </div>
</div></body></html>
