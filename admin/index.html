<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LaundroSwipe Admin — Pro Fab Power Laundry</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#1746A2;--bl:#E8EEFB;--o:#F97316;--ol:#FFF7ED;--t:#0D9488;--tl:#CCFBF1;--ok:#16A34A;--er:#EF4444;--bg:#F1F3F8;--tx:#1A1D2E;--ts:#64748B;--tm:#94A3B8;--bd:#E2E8F0;--c:#FFF;--fd:'Fraunces',serif;--fb:'DM Sans',sans-serif}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0F3285,var(--b),#2558C4)}
.login-card{background:#fff;border-radius:20px;padding:40px 32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:fadeIn .5s}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-family:var(--fd);font-size:24px;color:var(--b);margin-top:12px}
.login-logo p{color:var(--ts);font-size:13px;margin-top:4px}
.login-icon{width:64px;height:64px;border-radius:16px;background:var(--b);display:flex;align-items:center;justify-content:center;margin:0 auto}
.fg{margin-bottom:18px}
.fl{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--tx)}
.fi{width:100%;padding:12px 16px;border-radius:8px;border:1.5px solid var(--bd);font-family:var(--fb);font-size:15px;outline:none;transition:.2s;color:var(--tx)}
.fi:focus{border-color:var(--b);box-shadow:0 0 0 3px var(--bl)}
.fi::placeholder{color:var(--tm)}
.btn{padding:14px 24px;border-radius:12px;font-family:var(--fb);font-size:15px;font-weight:600;cursor:pointer;border:none;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.bp{background:var(--b);color:#fff;box-shadow:0 2px 12px rgba(23,70,162,.25)}.bp:hover{background:#1338A0}
.bbl{width:100%}.bout{background:transparent;border:1.5px solid var(--bd);color:var(--tx)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err-msg{color:var(--er);font-size:13px;margin-top:8px;text-align:center}

/* DASHBOARD */
.dash{display:flex;min-height:100vh}
.sidebar{width:260px;background:#fff;border-right:1px solid var(--bd);padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;bottom:0}
.sb-logo{padding:0 24px 24px;border-bottom:1px solid var(--bd)}
.sb-logo h2{font-family:var(--fd);font-size:18px;color:var(--b)}
.sb-logo p{font-size:12px;color:var(--ts);margin-top:2px}
.sb-nav{padding:16px 12px;flex:1}
.sb-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;cursor:pointer;transition:.2s;font-size:14px;font-weight:500;color:var(--ts);margin-bottom:4px}
.sb-item:hover{background:var(--bg);color:var(--tx)}
.sb-item.active{background:var(--bl);color:var(--b);font-weight:600}
.sb-item .ic{font-size:18px;width:24px;text-align:center}
.sb-foot{padding:16px 24px;border-top:1px solid var(--bd)}
.sb-foot .user{font-size:13px;font-weight:600;color:var(--tx)}
.sb-foot .email{font-size:11px;color:var(--tm)}

.main{margin-left:260px;flex:1;padding:28px 32px}
.page-title{font-family:var(--fd);font-size:26px;font-weight:700;margin-bottom:6px}
.page-sub{color:var(--ts);font-size:14px;margin-bottom:24px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.stat-num{font-family:var(--fd);font-size:32px;font-weight:800;color:var(--b)}
.stat-label{font-size:13px;color:var(--ts);margin-top:2px}
.stat-card.orange .stat-num{color:var(--o)}
.stat-card.teal .stat-num{color:var(--t)}
.stat-card.green .stat-num{color:var(--ok)}

/* TABLE */
.table-wrap{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.04);overflow:hidden}
.table-head{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.table-head h3{font-family:var(--fd);font-size:18px;font-weight:700}
.table-filters{display:flex;gap:8px}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:#fff;color:var(--ts);transition:.2s}
.filter-btn:hover,.filter-btn.active{background:var(--bl);color:var(--b);border-color:var(--b)}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:12px 16px;font-size:12px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);background:var(--bg)}
tbody td{padding:14px 16px;font-size:14px;border-bottom:1px solid var(--bd)}
tbody tr{transition:.15s}
tbody tr:hover{background:var(--bl)}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;display:inline-block}
.b-sch{background:#FEF3C7;color:#92400E}.b-pro{background:var(--bl);color:var(--b)}.b-del{background:#DCFCE7;color:var(--ok)}
.b-student{background:var(--ol);color:var(--o)}
.token-cell{font-family:var(--fd);font-weight:800;color:var(--o);font-size:16px;letter-spacing:1px}
.action-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.2s}
.action-btn.advance{background:var(--bl);color:var(--b)}
.action-btn.advance:hover{background:var(--b);color:#fff}

/* USERS TABLE */
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--b);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--fd);flex-shrink:0}

/* TOAST */
.toast{position:fixed;top:20px;right:20px;background:var(--tx);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;animation:fadeIn .3s;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.toast.ok{background:var(--ok)}.toast.er{background:var(--er)}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--ts)}
.empty .em{font-size:48px;margin-bottom:12px}

/* RESPONSIVE */
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:20px 16px}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="admin"></div>
<script>
// ===== SUPABASE CONFIG =====
const SUPA_URL='YOUR_SUPABASE_URL_HERE';
const SUPA_KEY='YOUR_SUPABASE_ANON_KEY_HERE';
let sb;try{sb=window.supabase.createClient(SUPA_URL,SUPA_KEY)}catch(e){}

// HARDCODED ADMIN CREDENTIALS
const ADMIN_EMAIL='profab@laundroswipe.com';
const ADMIN_PASS='Mujeeb@123';

const STATUSES=['scheduled','agent_assigned','picked_up','processing','ready','out_for_delivery','delivered'];
const STATUS_LABELS=['Scheduled','Agent Assigned','Picked Up','Processing','Ready','Out for Delivery','Delivered'];

const AD={
  loggedIn:false,
  tab:'orders',
  filter:'all',
  orders:[],  // will load from localStorage or Supabase
  users:[],
  toastTm:null,

  init(){
    const saved=localStorage.getItem('admin_logged');
    if(saved==='true'){this.loggedIn=true;this.loadData()}
    this.r();
  },

  loadData(){
    // Load orders & users from localStorage (shared with main app on same domain)
    // In production, these would come from Supabase
    const rawOrders=localStorage.getItem('ls_o');
    const rawUser=localStorage.getItem('ls_u');
    this.orders=rawOrders?JSON.parse(rawOrders):[];
    this.users=rawUser?[JSON.parse(rawUser)]:[];

    // Also check for demo data
    if(!this.orders.length){
      // Seed some demo orders
      this.orders=[
        {id:'o1',on:'LS-20260313-001',tk:'472',svc:'wash_fold',sl:'Wash & Fold',pd:'2026-03-14',ts:'Afternoon',status:'scheduled',ca:'2026-03-13T10:00:00Z',ins:'',user:'Rahul K'},
        {id:'o2',on:'LS-20260313-002',tk:'815',svc:'wash_iron',sl:'Wash & Iron',pd:'2026-03-14',ts:'Afternoon',status:'picked_up',ca:'2026-03-13T11:30:00Z',ins:'Separate whites',user:'Sneha M'},
        {id:'o3',on:'LS-20260311-001',tk:'293',svc:'dry_clean',sl:'Dry Cleaning',pd:'2026-03-11',ts:'Afternoon',status:'delivered',ca:'2026-03-11T09:00:00Z',ins:'',user:'Arjun R'},
        {id:'o4',on:'LS-20260313-003',tk:'641',svc:'iron_only',sl:'Iron Only',pd:'2026-03-15',ts:'Afternoon',status:'processing',ca:'2026-03-13T14:00:00Z',ins:'Handle with care',user:'Priya S'},
      ];
    }
  },

  toast(m,t=''){clearTimeout(this.toastTm);document.querySelector('.toast')?.remove();const e=document.createElement('div');e.className=`toast ${t}`;e.textContent=m;document.body.appendChild(e);this.toastTm=setTimeout(()=>e.remove(),3000)},

  statusBadge(s){if(['scheduled','agent_assigned'].includes(s))return'b-sch';if(s==='delivered')return'b-del';return'b-pro'},
  statusLabel(s){const i=STATUSES.indexOf(s);return STATUS_LABELS[i]||s},

  r(){
    const el=document.getElementById('admin');
    el.innerHTML=this.loggedIn?this.rDash():this.rLogin();
    this.bind();
  },

  rLogin(){
    return`<div class="login-wrap"><div class="login-card"><div class="login-logo"><div class="login-icon"><svg viewBox="0 0 24 24" fill="none" width="32" height="32"><rect x="4" y="3" width="16" height="18" rx="2" stroke="white" stroke-width="2"/><circle cx="12" cy="13" r="4" stroke="white" stroke-width="1.5"/></svg></div><h1>LaundroSwipe Admin</h1><p>Pro Fab Power Laundry Services</p></div><div class="fg"><label class="fl">Email</label><input class="fi" id="a-em" type="email" placeholder="admin@laundroswipe.com" value=""></div><div class="fg"><label class="fl">Password</label><input class="fi" id="a-pw" type="password" placeholder="Enter password"></div><div id="a-err" class="err-msg" style="display:none"></div><button class="btn bp bbl" id="a-login" style="margin-top:8px">Log In to Dashboard</button></div></div>`;
  },

  rDash(){
    const filtered=this.filter==='all'?this.orders:this.orders.filter(o=>o.status===this.filter);
    const total=this.orders.length;
    const active=this.orders.filter(o=>o.status!=='delivered').length;
    const delivered=this.orders.filter(o=>o.status==='delivered').length;
    const revenue=this.orders.length*20; // ₹20 per order convenience fee

    return`<div class="dash"><aside class="sidebar"><div class="sb-logo"><h2>🧺 LaundroSwipe</h2><p>Admin Dashboard</p></div><nav class="sb-nav"><div class="sb-item ${this.tab==='orders'?'active':''}" onclick="AD.tab='orders';AD.r()"><span class="ic">📦</span>Orders</div><div class="sb-item ${this.tab==='users'?'active':''}" onclick="AD.tab='users';AD.r()"><span class="ic">👥</span>Users</div><div class="sb-item ${this.tab==='colleges'?'active':''}" onclick="AD.tab='colleges';AD.r()"><span class="ic">🎓</span>Colleges</div><div class="sb-item ${this.tab==='settings'?'active':''}" onclick="AD.tab='settings';AD.r()"><span class="ic">⚙️</span>Settings</div></nav><div class="sb-foot"><div class="user">Pro Fab Power Laundry</div><div class="email">profab@laundroswipe.com</div><button class="btn bout" style="margin-top:12px;padding:8px 16px;font-size:12px;width:100%" onclick="AD.logout()">Log Out</button></div></aside><div class="main">${this.tab==='orders'?this.rOrders(filtered,total,active,delivered,revenue):''}${this.tab==='users'?this.rUsers():''}${this.tab==='colleges'?this.rColleges():''}${this.tab==='settings'?this.rSettings():''}</div></div>`;
  },

  rOrders(filtered,total,active,delivered,revenue){
    return`<div style="animation:fadeIn .4s"><div class="page-title">Orders</div><div class="page-sub">Manage all laundry orders</div><div class="stats"><div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Orders</div></div><div class="stat-card orange"><div class="stat-num">${active}</div><div class="stat-label">Active</div></div><div class="stat-card green"><div class="stat-num">${delivered}</div><div class="stat-label">Delivered</div></div><div class="stat-card teal"><div class="stat-num">₹${revenue}</div><div class="stat-label">Convenience Fees</div></div></div><div class="table-wrap"><div class="table-head"><h3>All Orders</h3><div class="table-filters">${['all','scheduled','picked_up','processing','delivered'].map(f=>`<button class="filter-btn ${this.filter===f?'active':''}" onclick="AD.filter='${f}';AD.r()">${f==='all'?'All':AD.statusLabel(f)}</button>`).join('')}</div></div>${!filtered.length?'<div class="empty"><div class="em">📭</div>No orders found</div>':`<table><thead><tr><th>Order</th><th>Token</th><th>Service</th><th>Date</th><th>Status</th><th>User</th><th>Action</th></tr></thead><tbody>${filtered.map(o=>`<tr><td style="font-weight:600;color:var(--b)">${o.on}</td><td class="token-cell">#${o.tk}</td><td>${o.sl}</td><td>${o.pd}</td><td><span class="badge ${this.statusBadge(o.status)}">${this.statusLabel(o.status)}</span></td><td>${o.user||'—'}</td><td>${o.status!=='delivered'?`<button class="action-btn advance" onclick="AD.advOrder('${o.id}')">Advance →</button>`:'<span style="color:var(--ok);font-size:12px;font-weight:600">✅ Done</span>'}</td></tr>`).join('')}</tbody></table>`}</div></div>`;
  },

  rUsers(){
    return`<div style="animation:fadeIn .4s"><div class="page-title">Users</div><div class="page-sub">Registered app users</div><div class="table-wrap"><div class="table-head"><h3>All Users</h3></div>${!this.users.length?'<div class="empty"><div class="em">👥</div>No users yet. Users will appear here when they register.</div>':`<table><thead><tr><th>User</th><th>Email</th><th>Phone</th><th>Type</th><th>College</th><th>Reg No</th></tr></thead><tbody>${this.users.map(u=>{const ini=(u.fn||u.fullName||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);const name=u.fn||u.fullName||'—';const email=u.em||u.email||'—';const phone=u.ph||u.phone||'—';const type=u.ut||u.userType||'general';const college=u.cid?'VIT Chennai':'—';const reg=u.rn||u.regNumber||'—';return`<tr><td style="display:flex;align-items:center;gap:10px"><div class="user-avatar">${ini}</div><span style="font-weight:600">${name}</span></td><td>${email}</td><td>${phone}</td><td>${type==='student'?'<span class="badge b-student">🎓 Student</span>':'<span class="badge b-pro">General</span>'}</td><td>${college}</td><td>${reg}</td></tr>`}).join('')}</tbody></table>`}</div></div>`;
  },

  rColleges(){
    const colleges=[
      {name:'VIT Chennai',code:'VIT_CHN',city:'Chennai',active:true},
      {name:'VIT Vellore',code:'VIT_VLR',city:'Vellore',active:false},
      {name:'VIT AP',code:'VIT_AP',city:'Amaravati',active:false},
      {name:'VIT Bhopal',code:'VIT_BPL',city:'Bhopal',active:false},
      {name:'SRM KTR',code:'SRM_KTR',city:'Kattankulathur',active:false},
      {name:'SRM VDP',code:'SRM_VDP',city:'Vadapalani',active:false},
      {name:'SRM Ramapuram',code:'SRM_RMP',city:'Chennai',active:false},
      {name:'Tagore Medical College',code:'TMC',city:'Chennai',active:false},
      {name:'Hindustan Engineering College',code:'HEC',city:'Chennai',active:false},
    ];
    return`<div style="animation:fadeIn .4s"><div class="page-title">Colleges</div><div class="page-sub">Manage campus availability</div><div class="table-wrap"><div class="table-head"><h3>All Colleges</h3></div><table><thead><tr><th>College</th><th>Code</th><th>City</th><th>Status</th></tr></thead><tbody>${colleges.map(c=>`<tr><td style="font-weight:600">${c.name}</td><td style="font-family:monospace;color:var(--ts)">${c.code}</td><td>${c.city}</td><td>${c.active?'<span class="badge b-del">✅ Active</span>':'<span class="badge b-sch">🔜 Coming Soon</span>'}</td></tr>`).join('')}</tbody></table></div></div>`;
  },

  rSettings(){
    return`<div style="animation:fadeIn .4s"><div class="page-title">Settings</div><div class="page-sub">Vendor and app configuration</div><div style="background:#fff;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.04);max-width:600px"><h3 style="font-family:var(--fd);font-size:18px;margin-bottom:20px">Vendor Details</h3><div class="fg"><label class="fl">Vendor Name</label><input class="fi" value="Pro Fab Power Laundry Services" readonly style="background:#F8FAFC"></div><div class="fg"><label class="fl">Available Days</label><input class="fi" value="Tuesday, Saturday" readonly style="background:#F8FAFC"></div><div class="fg"><label class="fl">Time Slot</label><input class="fi" value="Afternoon (12:00 PM – 4:00 PM)" readonly style="background:#F8FAFC"></div><div class="fg"><label class="fl">Pickup Location</label><input class="fi" value="VIT Chennai Campus" readonly style="background:#F8FAFC"></div><div class="fg"><label class="fl">Convenience Fee</label><input class="fi" value="₹20 per order" readonly style="background:#F8FAFC"></div><div style="padding:12px 16px;background:rgba(249,115,22,.08);border-radius:8px;font-size:13px;color:var(--o);margin-top:8px">⚠️ To change settings, update the Supabase database directly or contact the developer.</div></div></div>`;
  },

  advOrder(id){
    const o=this.orders.find(x=>x.id===id);if(!o)return;
    const i=STATUSES.indexOf(o.status);
    if(i<STATUSES.length-1){
      o.status=STATUSES[i+1];
      // Save back to localStorage so the user app sees the update too
      localStorage.setItem('ls_o',JSON.stringify(this.orders));
      this.toast(`Order ${o.on} → ${this.statusLabel(o.status)}`,'ok');
      this.r();
    }
  },

  logout(){
    localStorage.removeItem('admin_logged');
    this.loggedIn=false;
    this.r();
  },

  bind(){
    const $=id=>document.getElementById(id);
    if($('a-login')){
      $('a-login').onclick=()=>{
        const em=$('a-em').value.trim();
        const pw=$('a-pw').value;
        const errEl=$('a-err');
        if(em===ADMIN_EMAIL&&pw===ADMIN_PASS){
          localStorage.setItem('admin_logged','true');
          this.loggedIn=true;
          this.loadData();
          this.r();
        }else{
          errEl.style.display='block';
          errEl.textContent='Invalid email or password. Please try again.';
        }
      };
      // Enter key
      $('a-pw').onkeydown=e=>{if(e.key==='Enter')$('a-login').click()};
    }
  }
};
AD.init();
</script>
</body>
</html>
