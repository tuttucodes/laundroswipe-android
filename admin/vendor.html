<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vendor Bill — LaundroSwipe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="application/json" id="ls-config">__LS_CONFIG_INJECT__</script>
<script>
(function(){
  try {
    var el = document.getElementById('ls-config');
    window.__LS_CONFIG__ = (el && el.textContent) ? JSON.parse(el.textContent) : {};
  } catch (e) {
    window.__LS_CONFIG__ = {};
  }
})();
</script>
<script src="../js/api.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#1746A2;--bl:#E8EEFB;--o:#F97316;--ok:#16A34A;--er:#EF4444;--bg:#F1F3F8;--tx:#1A1D2E;--ts:#64748B;--bd:#E2E8F0;--fd:'Fraunces',serif;--fb:'DM Sans',sans-serif}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);min-height:100vh;padding:16px}
h1{font-family:var(--fd);font-size:22px;margin-bottom:8px;color:var(--b)}
.sub{color:var(--ts);font-size:14px;margin-bottom:20px}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.fi{width:100%;padding:12px 14px;border-radius:8px;border:1.5px solid var(--bd);font-size:15px;outline:none}
.fi:focus{border-color:var(--b)}
.btn{padding:12px 20px;border-radius:10px;font-weight:600;cursor:pointer;border:none;transition:.2s;display:inline-flex;align-items:center;gap:8px;font-family:var(--fb)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.bp{background:var(--b);color:#fff}.bp:hover:not(:disabled){background:#1338A0}
.bo{background:var(--o);color:#fff}.bo:hover:not(:disabled){filter:brightness(1.1)}
.bout{background:transparent;border:1.5px solid var(--bd);color:var(--tx)}
.err{color:var(--er);font-size:13px;margin-top:8px}
.cust-info{font-size:14px;line-height:1.7;color:var(--ts)}
.cust-info strong{color:var(--tx)}
.add-row{display:grid;grid-template-columns:1fr 80px 60px;gap:8px;align-items:end;margin-bottom:12px}
.add-row select{padding:10px;border-radius:8px;border:1.5px solid var(--bd);font-size:14px}
.add-row input{padding:10px;border-radius:8px;border:1.5px solid var(--bd);font-size:14px;text-align:center}
.lines{margin-top:16px;border-top:1px solid var(--bd);padding-top:12px}
.line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px;border-bottom:1px dashed var(--bd)}
.line:last-child{border-bottom:none}
.total-row{font-weight:700;font-size:16px;margin-top:12px;padding-top:12px;border-top:2px solid var(--b)}
.conv-fee{color:var(--o);font-size:14px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:10px;color:#fff;font-weight:500;z-index:9999;animation:fadeIn .3s}
.toast.ok{background:var(--ok)}.toast.er{background:var(--er)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Thermal print (2" / 58mm) - shown in print window */
@media print{
  body{background:#fff;padding:0;font-size:12px}
  .no-print{display:none!important}
  .receipt{width:58mm!important;max-width:58mm;margin:0 auto;padding:8px;font-size:11px}
  .receipt *{color:#000!important}
}
.receipt{width:280px;margin:0 auto;padding:16px;font-size:12px;border:1px dashed var(--bd)}
.receipt h2{text-align:center;font-size:14px;margin-bottom:4px}
.receipt .meta{font-size:10px;color:var(--ts);margin-bottom:12px}
.receipt table{width:100%;border-collapse:collapse;font-size:11px}
.receipt th,.receipt td{padding:4px 0;text-align:left}
.receipt th{border-bottom:1px solid var(--bd)}
.receipt .right{text-align:right}
.receipt .total{font-weight:700;font-size:13px;margin-top:8px;border-top:2px solid #000;padding-top:6px}
.receipt .conv{font-size:11px;color:var(--ts)}
@media(max-width:480px){.add-row{grid-template-columns:1fr 70px 50px}}
</style>
</head>
<body>
<div class="no-print">
  <p style="margin-bottom:12px"><a href="/admin/" style="color:var(--b);font-weight:600;text-decoration:none">← Back to Dashboard</a></p>
  <h1>Vendor Bill</h1>
  <p class="sub">Enter token to load order, add items, then print bill (2" thermal).</p>

  <div class="card">
    <div class="fg">
      <label class="fl">Token number</label>
      <input type="text" class="fi" id="token-inp" placeholder="e.g. 472" autocomplete="off">
    </div>
    <button class="btn bp" id="lookup-btn">Lookup order</button>
    <div id="lookup-err" class="err" style="display:none"></div>
  </div>

  <div id="order-card" class="card" style="display:none">
    <div class="cust-info" id="cust-info"></div>
    <div style="margin-top:16px">
      <label class="fl">Add item</label>
      <div class="add-row">
        <select id="item-sel">
          <option value="">Select item</option>
        </select>
        <input type="number" id="item-qty" min="1" value="1" placeholder="Qty">
        <button class="btn bo" id="add-item-btn">Add</button>
      </div>
    </div>
    <div class="lines" id="lines-wrap">
      <div id="lines-list"></div>
      <div id="total-items" style="font-size:13px;color:var(--ts);margin-top:8px"></div>
      <div class="total-row" id="subtotal-row">Subtotal: ₹0</div>
      <div class="total-row conv-fee" id="conv-row">Convenience fee: ₹20</div>
      <div class="total-row" id="grand-row">Total: ₹20</div>
    </div>
    <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn bp" id="print-btn">Print bill (2" thermal)</button>
      <button class="btn bout" id="new-bill-btn">New bill</button>
    </div>
  </div>
</div>

<div id="print-area" style="display:none" class="receipt"></div>

<script>
const CONVENIENCE_FEE = 20;

const BILL_ITEMS = [
  { id: 'shirt', label: 'Shirt', price: 19 },
  { id: 'tshirt', label: 'T shirt', price: 19 },
  { id: 'white_shirt', label: 'White shirt', price: 25 },
  { id: 'white_tshirt', label: 'White t shirt', price: 25 },
  { id: 'shirt_dc', label: 'Shirt dc', price: 50 },
  { id: 'tshirt_dc', label: 'T-shirts dc', price: 50 },
  { id: 'white_shirt_dc', label: 'White shirt dc', price: 60 },
  { id: 'white_tshirt_dc', label: 'White t shirt dc', price: 60 },
  { id: 'white_pants', label: 'White pants', price: 25 },
  { id: 'white_pants_dc', label: 'White pants dc', price: 60 },
  { id: 'white_jean', label: 'White jean', price: 25 },
  { id: 'white_jean_dc', label: 'White jean dc', price: 60 },
  { id: 'pant', label: 'Pant', price: 22 },
  { id: 'pant_dc', label: 'Pant dc', price: 50 },
  { id: 'jean', label: 'Jean', price: 22 },
  { id: 'jeans_dc', label: 'Jeans dc', price: 50 },
  { id: 'bedsheet', label: 'Bedsheet', price: 30 },
  { id: 'bedsheet_dc', label: 'Bedsheet dc', price: 60 },
  { id: 'pillow', label: 'Pillow', price: 15 },
  { id: 'pillow_dc', label: 'Pillow dc', price: 30 },
  { id: 'hoodie', label: 'Hoodie', price: 50 },
  { id: 'hoodie_dc', label: 'Hoodie dc', price: 80 },
  { id: 'jacket', label: 'Jacket', price: 50 },
  { id: 'jacket_dc', label: 'Jacket dc', price: 80 },
  { id: 'shorts', label: 'Shorts', price: 19 },
  { id: 'shorts_dc', label: 'Shorts dc', price: 40 },
  { id: 'shoe_wash', label: 'Shoe wash', price: 150 },
  { id: 'blanket_big_dc', label: 'Blanket big dc', price: 110 },
  { id: 'blanket_small_dc', label: 'Blanket small dc', price: 90 },
  { id: 'quilt_dc', label: 'Quilt dc', price: 130 },
  { id: 'track_pant', label: 'Track pant', price: 19 },
  { id: 'track_pant_dc', label: 'Track pant dc', price: 50 },
  { id: 'white_track_pant', label: 'White track pant', price: 25 },
  { id: 'white_track_pant_dc', label: 'White track pant dc', price: 60 },
  { id: 'towel', label: 'Towel', price: 20 },
  { id: 'towel_dc', label: 'Towel dc', price: 40 },
  { id: 'turkey_towel', label: 'Turkey towel', price: 25 },
  { id: 'turkey_towel_dc', label: 'Turkey towel dc', price: 40 },
  { id: 'hand_towel', label: 'Hand towel', price: 12 },
  { id: 'hand_towel_dc', label: 'Hand towel dc', price: 22 },
  { id: 'dhoti', label: 'Dhoti', price: 50 },
  { id: 'dhoti_dc', label: 'Dhoti dc', price: 80 },
  { id: 'kurtha', label: 'Kurtha', price: 50 },
  { id: 'kurtha_dc', label: 'Kurtha dc', price: 80 },
  { id: 'iron_only', label: 'Only ironing', price: 10 },
  { id: 'ladies_top', label: 'Ladies top', price: 25 },
  { id: 'ladies_top_dc', label: 'Ladies top dc', price: 60 },
  { id: 'leggings', label: 'Leggings', price: 20 },
  { id: 'leggings_dc', label: 'Leggings dc', price: 50 },
  { id: 'bedsheet_heavy', label: 'Bedsheet heavy', price: 40 },
  { id: 'white_bedsheet', label: 'White bedsheet', price: 40 },
  { id: 'dupatta', label: 'Dupatta', price: 22 },
  { id: 'dupatta_dc', label: 'Dupatta dc', price: 40 },
  { id: 'cap', label: 'Cap', price: 25 },
  { id: 'cap_dc', label: 'Cap dc', price: 40 },
  { id: 'bag_wash', label: 'Bag wash', price: 150 },
];

let currentOrder = null;
let currentUser = null;
let lineItems = [];

const $ = id => document.getElementById(id);

function fillItemSelect() {
  const sel = $('item-sel');
  sel.innerHTML = '<option value="">Select item</option>' +
    BILL_ITEMS.map(i => `<option value="${i.id}" data-price="${i.price}" data-label="${i.label}">${i.label} — ₹${i.price}</option>`).join('');
}

function showOrder(order, user) {
  currentOrder = order;
  currentUser = user || {};
  lineItems = [];
  $('order-card').style.display = 'block';
  $('cust-info').innerHTML = `
    <strong>Order:</strong> ${order.order_number || order.on} &nbsp;|&nbsp; <strong>Token:</strong> #${order.token}<br>
    <strong>Customer:</strong> ${user.full_name || user.fn || '—'}<br>
    <strong>Phone:</strong> ${user.phone || user.ph || '—'} &nbsp;|&nbsp; <strong>Email:</strong> ${user.email || user.em || '—'}<br>
    <strong>Service:</strong> ${order.service_name || order.sl} &nbsp;|&nbsp; <strong>Date:</strong> ${order.pickup_date || order.pd}
  `;
  renderLines();
}

function addLine() {
  const sel = $('item-sel');
  const qty = parseInt($('item-qty').value, 10) || 1;
  const opt = sel.options[sel.selectedIndex];
  if (!opt || !opt.value) return;
  const label = opt.getAttribute('data-label');
  const price = parseInt(opt.getAttribute('data-price'), 10);
  lineItems.push({ id: opt.value, label, price, qty });
  $('item-qty').value = 1;
  renderLines();
}

function removeLine(i) {
  lineItems.splice(i, 1);
  renderLines();
}

function renderLines() {
  const list = $('lines-list');
  list.innerHTML = lineItems.length
    ? lineItems.map((l, i) => `<div class="line">
      <span>${l.label} × ${l.qty} @ ₹${l.price}</span>
      <span>₹${l.price * l.qty} <button type="button" class="btn bout" style="padding:4px 8px;font-size:11px;margin-left:6px" onclick="removeLine(${i})">×</button></span>
    </div>`).join('')
    : '<div style="color:var(--ts);font-size:13px">No items yet. Add items above.</div>';
  const totalItems = lineItems.reduce((s, l) => s + l.qty, 0);
  const subtotal = lineItems.reduce((s, l) => s + l.price * l.qty, 0);
  const total = subtotal + CONVENIENCE_FEE;
  $('total-items').textContent = `Total items: ${totalItems}`;
  $('subtotal-row').textContent = `Subtotal: ₹${subtotal}`;
  $('conv-row').textContent = `Convenience fee: ₹${CONVENIENCE_FEE}`;
  $('grand-row').textContent = `Total: ₹${total}`;
}

function buildReceiptHtml() {
  const subtotal = lineItems.reduce((s, l) => s + l.price * l.qty, 0);
  const total = subtotal + CONVENIENCE_FEE;
  const user = currentUser || {};
  const order = currentOrder || {};
  let rows = lineItems.map(l => `<tr><td>${l.label} x${l.qty}</td><td class="right">${l.price * l.qty}</td></tr>`).join('');
  if (!rows) rows = '<tr><td colspan="2">No items</td></tr>';
  return `
    <h2>LaundroSwipe</h2>
    <p class="meta">Pro Fab Power Laundry</p>
    <p><strong>Order:</strong> ${order.order_number || order.on} &nbsp; <strong>Token:</strong> #${order.token}</p>
    <p><strong>Customer:</strong> ${user.full_name || user.fn || '—'}</p>
    <p><strong>Phone:</strong> ${user.phone || user.ph || '—'}</p>
    <table>
      <thead><tr><th>Item</th><th class="right">₹</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <p class="right">Subtotal: ₹${subtotal}</p>
    <p class="right conv">Convenience fee: ₹${CONVENIENCE_FEE}</p>
    <p class="total right">Total: ₹${total}</p>
    <p style="text-align:center;margin-top:12px;font-size:10px">Thank you!</p>
  `;
}

function printBill() {
  const area = $('print-area');
  area.innerHTML = buildReceiptHtml();
  area.style.display = 'block';
  const w = window.open('', '_blank', 'width=320,height=480');
  const receiptBody = buildReceiptHtml();
  w.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8"><title>Bill #${(currentOrder && currentOrder.token) || ''}</title>
    <style>
    body{font-family:system-ui,sans-serif;font-size:11px;padding:8px;margin:0;width:58mm;max-width:58mm}
    table{width:100%;border-collapse:collapse;font-size:10px}
    th,td{padding:2px 0}
    .right{text-align:right}
    .total{font-weight:700;font-size:12px;border-top:2px solid #000;padding-top:4px;margin-top:4px}
    .conv{font-size:10px;color:#666}
    h2{text-align:center;font-size:13px;margin:0 0 2px}
    p{margin:2px 0;font-size:10px}
    @media print{body{width:58mm!important;max-width:58mm!important}}
    </style></head><body>
    ${receiptBody}
    </body></html>
  `);
  w.document.close();
  w.focus();
  setTimeout(() => { w.print(); w.close(); }, 300);
  area.style.display = 'none';
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

$('lookup-btn').onclick = async () => {
  const token = ($('token-inp').value || '').trim().replace(/^#/, '');
  $('lookup-err').style.display = 'none';
  if (!token) {
    $('lookup-err').textContent = 'Enter token number';
    $('lookup-err').style.display = 'block';
    return;
  }
  $('lookup-btn').disabled = true;
  $('lookup-btn').textContent = 'Looking up…';
  if (window.LSApi && LSApi.hasSupabase && LSApi.fetchOrderByToken) {
    const result = await LSApi.fetchOrderByToken(token);
    if (result && result.order) {
      showOrder(result.order, result.user);
      toast('Order loaded', 'ok');
    } else {
      $('lookup-err').textContent = 'No order found for this token.';
      $('lookup-err').style.display = 'block';
    }
  } else {
    $('lookup-err').textContent = 'Supabase not connected. Use the main app with config.';
    $('lookup-err').style.display = 'block';
  }
  $('lookup-btn').disabled = false;
  $('lookup-btn').textContent = 'Lookup order';
};

$('add-item-btn').onclick = addLine;
$('item-qty').onkeydown = e => { if (e.key === 'Enter') addLine(); };
$('print-btn').onclick = () => {
  if (!lineItems.length) { toast('Add at least one item', 'er'); return; }
  printBill();
  toast('Print dialog opened. Select your Bluetooth thermal printer.', 'ok');
};
$('new-bill-btn').onclick = () => {
  lineItems = [];
  if (currentOrder) renderLines();
  else $('order-card').style.display = 'none';
  $('token-inp').value = '';
  $('token-inp').focus();
};

fillItemSelect();
</script>
</body>
</html>
